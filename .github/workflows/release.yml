name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to publish"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and notes file
        id: vars
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi

          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag '$TAG' does not exist in this checkout" >&2
            exit 1
          fi

          NOTES_FILE="docs/releases/${TAG}.md"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
          NOTES_FILE: ${{ steps.vars.outputs.notes_file }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            if [ -f "$NOTES_FILE" ]; then
              gh release edit "$TAG" --notes-file "$NOTES_FILE"
            else
              echo "Release already exists and no notes file was found; leaving notes unchanged."
            fi
          else
            if [ -f "$NOTES_FILE" ]; then
              gh release create "$TAG" --verify-tag --title "$TAG" --notes-file "$NOTES_FILE"
            else
              gh release create "$TAG" --verify-tag --title "$TAG" --generate-notes
            fi
          fi
